    <!-- Main Content -->
    <main class="container">
        <h1>Academic Planner</h1>
        <p style="margin-bottom: 2rem;">Manage your academic tasks efficiently. Add tasks, mark them as completed, or delete them.</p>

        <div class="planner-container">
            
            <div class="task-form">
                <input type="text" id="taskInput" class="task-input" placeholder="Enter a new academic task...">
                <button id="addTaskBtn" class="btn">Add Task</button>
            </div>

            <ul id="taskList" class="task-list">
                <!-- Tasks will be dynamically injected here by JavaScript -->
            </ul>
            
        </div>
    </main>
