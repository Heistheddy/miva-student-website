<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio - Contact Me</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Navigation -->
    <header>
        <nav>
            <div class="logo">MyPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container">
        <h1 style="text-align: center;">Contact Me</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Feel free to reach out for collaborations or inquiries by filling out the form below.</p>

        <div class="contact-wrapper">
            <form id="contactForm" novalidate>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="John Doe">
                    <div id="nameError" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="johndoe@example.com">
                    <div id="emailError" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="08123456789">
                    <div id="phoneError" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Type your message here..."></textarea>
                    <div id="messageError" class="form-error"></div>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Send Message</button>

            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Miva Open University & Olatade Onibudo. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
